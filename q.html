<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz App</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #ffffff;
  color: #222;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: #ffffff;
  padding: 10px 15px;
  z-index: 10;
}

/* DROPDOWN */
.dropdown {
  position: relative;
  width: 300px;
}

#topicInput {
  width: 100%;
  padding: 10px;
  font-size: 1rem;
  border-radius: 6px;
  border: 1.5px solid #ccc;
}

.dropdown-list {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  background: white;
  border: 1px solid #ccc;
  border-top: none;
  max-height: 200px;
  overflow-y: auto;
  z-index: 1000;
}

.dropdown-item {
  padding: 10px;
  cursor: pointer;
}

.dropdown-item:hover {
  background: #f0f8ff;
}

/* MAIN */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* PROGRESS */
#progressText {
  text-align: center;
  font-weight: 600;
  margin-bottom: 10px;
}

/* QUESTION */
.question {
  font-size: 1.5rem;
  margin-bottom: 20px;
}

/* OPTIONS */
.option {
  display: flex;
  align-items: center;
  margin: 10px 0;
  padding: 12px;
  cursor: pointer;
}

.option input {
  margin-right: 10px;
}

.option:hover:not(.correct):not(.wrong) {
  background: #f0f8ff;
}

.option.correct {
  background: #28a745;
  color: white;
}

.option.wrong {
  background: #dc3545;
  color: white;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px;
  font-size: 1.2rem;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  max-width: 250px;
}

button:hover {
  background: #0056b3;
}

/* SCORE */
#score {
  text-align: center;
  font-size: 1.5rem;
  margin-top: 30px;
}

/* MOBILE */
@media (max-width: 600px) {
  .dropdown { width: 100%; }
  .question { font-size: 1.2rem; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="dropdown">
    <input type="text" id="topicInput" placeholder="Select topic or type 'all'" autocomplete="off">
    <div id="dropdownList" class="dropdown-list"></div>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <div id="quiz" style="display:none;">
    <div id="progressText"></div>

    <div class="question" id="question"></div>
    <form id="optionsForm"></form>

    <button id="actionBtn">Submit</button>
  </div>

  <div id="score"></div>

</div>

<script>
const csvUrl = 'https://naveengd.github.io/study/q.csv';

let allQuestions = [];
let filteredQuestions = [];
let currentIndex = 0;
let score = 0;
let showingFeedback = false;

const actionBtn = document.getElementById('actionBtn');
const progressText = document.getElementById('progressText');
const topicInput = document.getElementById('topicInput');
const dropdownList = document.getElementById('dropdownList');

actionBtn.addEventListener('click', handleAction);
topicInput.addEventListener('input', filterDropdown);
topicInput.addEventListener('keydown', (e)=>{
  if(e.key==='Enter'){ startQuiz(); e.preventDefault(); }
});

/* FETCH CSV */
async function fetchCsv(url){
  const res = await fetch(url);
  return await res.text();
}

/* PARSE CSV (TOPIC FIRST COLUMN) */
function parseCSV(text){
  const lines = text.trim().split('\n');
  const topicsSet = new Set();

  allQuestions = lines.slice(1).map(line=>{
    const cols = line.split(',');

    const topic = cols[0]?.trim() || 'General';
    topicsSet.add(topic);

    return {
      question: cols[1],
      options: cols.slice(2,6),
      correct: cols[6].trim(),
      topic
    };
  });

  populateDropdown([...topicsSet]);
}

/* DROPDOWN */
function populateDropdown(topics){
  dropdownList.innerHTML='';
  topics.forEach(t=>{
    const div = document.createElement('div');
    div.className = 'dropdown-item';
    div.innerText = t;

    div.onclick = ()=>{
      topicInput.value = t;
      dropdownList.innerHTML='';
      startQuiz();
    };

    dropdownList.appendChild(div);
  });
}

function filterDropdown(){
  const value = topicInput.value.toLowerCase();
  const topics = [...new Set(allQuestions.map(q=>q.topic))];
  const filtered = topics.filter(t=>t.toLowerCase().includes(value));
  populateDropdown(filtered);
}

document.addEventListener('click', (e)=>{
  if(!e.target.closest('.dropdown')){
    dropdownList.innerHTML='';
  }
});

/* QUIZ */
function startQuiz(){
  const selectedTopic = topicInput.value.trim().toLowerCase() || 'all';

  filteredQuestions = selectedTopic==='all'
    ? allQuestions
    : allQuestions.filter(q=>q.topic.toLowerCase()===selectedTopic);

  if(filteredQuestions.length===0){
    alert('No questions available!');
    return;
  }

  currentIndex=0;
  score=0;
  showingFeedback=false;

  document.getElementById('quiz').style.display='block';
  document.getElementById('score').innerHTML='';

  showQuestion();
}

function updateProgress(){
  progressText.textContent = `${currentIndex + 1} / ${filteredQuestions.length}`;
}

function showQuestion(){
  showingFeedback=false;
  updateProgress();

  const q = filteredQuestions[currentIndex];
  document.getElementById('question').innerText = `Q${currentIndex+1}: ${q.question}`;

  const form = document.getElementById('optionsForm');
  form.innerHTML='';

  q.options.forEach((opt,i)=>{
    const letter=['A','B','C','D'][i];

    const label=document.createElement('label');
    label.className='option';

    const radio=document.createElement('input');
    radio.type='radio';
    radio.name='answer';
    radio.value=letter;

    label.appendChild(radio);
    label.appendChild(document.createTextNode(" "+opt));

    form.appendChild(label);
  });

  actionBtn.innerText='Submit';
}

function handleAction(){
  const q = filteredQuestions[currentIndex];
  const selected = document.querySelector('input[name="answer"]:checked');

  if(!showingFeedback){
    if(!selected){
      alert('Select an answer');
      return;
    }

    const selectedValue = selected.value;
    const labels = document.querySelectorAll('.option');

    labels.forEach((label,i)=>{
      const letter=['A','B','C','D'][i];
      const input=label.querySelector('input');

      if(letter===q.correct) label.classList.add('correct');
      else if(letter===selectedValue) label.classList.add('wrong');

      input.disabled=true;
    });

    if(selectedValue===q.correct) score++;

    showingFeedback=true;
    actionBtn.innerText='Next';

  } else {
    currentIndex++;

    if(currentIndex < filteredQuestions.length){
      showQuestion();
    } else {
      showScore();
    }
  }
}

function showScore(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('score').innerText =
    `Your Score: ${score} / ${filteredQuestions.length}`;
}

/* INIT */
(async ()=>{
  const csvText = await fetchCsv(csvUrl);
  parseCSV(csvText);
})();
</script>

</body>
</html>
